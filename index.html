<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.jpeg" type="image/x-icon">
    <title>FASTER CAFE | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        red: {
                            50: '#fef2f2',
                            100: '#fee2e2',
                            200: '#fecaca',
                            600: '#E72229',
                        },
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .filter-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            flex: 0 0 calc(33.333% - 8px); 
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: fit-content;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .filter-btn {
                flex: 0 0 auto;
            }
        }

        .active-cat {
            background-color: #000 !important;
            color: #fff !important;
        }

        #cat-scroll {
            scroll-snap-type: x mandatory;
        }
        
        .filter-btn {
            scroll-snap-align: start;
        }
    </style>
</head>

<body class="bg-white">

    <div id="navbar-placeholder"></div>
<!-- note
    <div class="relative top-[72px] w-full z-[80]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6">
            <div class="bg-gradient-to-r from-red-100 via-white to-red-100 border-x-2 border-b-2 border-red-200 rounded-b-[30px] py-5 px-6 text-center shadow-md">
                <p class="text-[10px] md:text-sm font-black text-red-600 uppercase tracking-wide">
                    Note: &nbsp; Some images may not exactly represent that item.
                </p>
            </div>
        </div>
    </div>
    -->

    <section class="relative top-[90px] max-w-7xl mx-auto px-4 sm:px-6 mb-10">
        <div class="relative group overflow-hidden rounded-[20px] md:rounded-[40px] bg-gray-100 shadow-xl aspect-[16/9] md:aspect-[21/9]">
            <div id="slider" class="flex transition-transform duration-700 ease-in-out h-full w-full">
                <div class="min-w-full h-full">
                    <img src="banner1.jpeg" class="w-full h-full object-contain md:object-cover" alt="Banner 1">
                </div>
                <div class="min-w-full h-full">
                    <img src="banner2.jpeg" class="w-full h-full object-contain md:object-cover" alt="Banner 2">
                </div>
            </div>

            <button onclick="moveSlide(-1)" class="absolute left-2 md:left-5 top-1/2 -translate-y-1/2 bg-white/80 p-2 md:p-3 rounded-full shadow-lg hover:bg-red-600 hover:text-white transition-all z-10">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 md:h-6 md:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <button onclick="moveSlide(1)" class="absolute right-2 md:right-5 top-1/2 -translate-y-1/2 bg-white/80 p-2 md:p-3 rounded-full shadow-lg hover:bg-red-600 hover:text-white transition-all z-10">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 md:h-6 md:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" />
                </svg>
            </button>
        </div>
    </section>

    <section class="relative min-h-[60vh] flex items-center pt-20 px-6 bg-white overflow-hidden">
        <div class="max-w-7xl mx-auto w-full text-center">
            <h1 class="text-6xl md:text-9xl font-black italic leading-[0.9] mb-8 uppercase">ORDER IT. <br>
                <span class="text-red-600">EAT IT.</span></h1>
            <a href="#menu" class="bg-black text-white px-10 py-5 rounded-2xl font-black text-lg hover:bg-red-600 transition inline-block shadow-2xl">EXPLORE MENU</a>
        </div>
    </section>

    <section id="menu" class="max-w-7xl mx-auto px-6 py-24">
        <div class="text-center mb-12">
            <h2 class="text-5xl font-black italic uppercase leading-none text-black">Our <span class="text-red-600">Menu</span></h2>
        </div>

        <div class="relative group max-w-5xl mx-auto mb-16 z-50">
            <button onclick="scrollCats(-200)" class="absolute -left-4 top-1/2 -translate-y-1/2 z-[60] bg-white shadow-lg border border-gray-100 w-10 h-10 rounded-full flex items-center justify-center text-black hover:text-red-600 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg>
            </button>

            <div id="cat-scroll" class="flex-1 flex overflow-x-auto no-scrollbar gap-2 bg-gray-100/80 backdrop-blur-md p-2 rounded-[35px] border border-gray-200 scroll-smooth mx-8">
                <button onclick="handleCategoryClick(this, 'All')" class="filter-btn active-cat px-6 py-2 rounded-full text-[10px] font-black uppercase">All</button>
                <button onclick="handleCategoryClick(this, 'Pizza')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Pizza</button>
                <button onclick="handleCategoryClick(this, 'Signature Pizza')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Signature Pizza</button>
                <button onclick="handleCategoryClick(this, 'Burgers')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Burgers</button>
                <button onclick="handleCategoryClick(this, 'Deals')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Deals</button>
                <button onclick="handleCategoryClick(this, 'Pizza Deals')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Pizza Deals</button>
                <button onclick="handleCategoryClick(this, 'Special Deals')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Special Deals</button>
                <button onclick="handleCategoryClick(this, 'Fries')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Fries</button>
                <button onclick="handleCategoryClick(this, 'Nuggets')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Nuggets</button>
                <button onclick="handleCategoryClick(this, 'Hot Wings')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Wings</button>
                <button onclick="handleCategoryClick(this, 'Chicken Strips')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Strips</button>
                <button onclick="handleCategoryClick(this, 'Wraps')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Wraps</button>
                <button onclick="handleCategoryClick(this, 'Shawarmas')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Shawarma</button>
                <button onclick="handleCategoryClick(this, 'Paratha Rolls')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Paratha</button>
                <button onclick="handleCategoryClick(this, 'Drinks')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Drinks</button>
                <button onclick="handleCategoryClick(this, 'Others')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Others</button>
            </div>

            <button onclick="scrollCats(200)" class="absolute -right-4 top-1/2 -translate-y-1/2 z-[60] bg-white shadow-lg border border-gray-100 w-10 h-10 rounded-full flex items-center justify-center text-black hover:text-red-600 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" /></svg>
            </button>
        </div>

        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </section>

    <div id="pizza-modal" class="hidden fixed inset-0 z-[1000] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
        <div class="modal-content bg-white w-full max-w-sm rounded-[30px] shadow-2xl flex flex-col max-h-[80vh] transform scale-90 opacity-0 transition-all duration-300">
            <div class="p-6 pb-4 flex-shrink-0 relative">
                <button onclick="closePizzaModal()" class="absolute top-4 right-4 text-gray-400 hover:text-red-600"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" /></svg></button>
                <span class="text-red-600 font-bold text-[10px] uppercase tracking-tighter">Selection Required</span>
                <h2 id="modal-pizza-name" class="text-xl font-black italic uppercase leading-tight line-clamp-1">Item Name</h2>
            </div>
            <div id="pizza-options" class="px-6 flex flex-col gap-2 overflow-y-auto flex-grow py-2"></div>
            <div class="p-6 pt-4 flex-shrink-0 border-t border-gray-100">
                <button onclick="confirmPizzaSelection()" class="w-full bg-black text-white py-4 rounded-2xl font-black text-xs hover:bg-red-600 transition shadow-lg">CONFIRM & ADD</button>
            </div>
        </div>
    </div>

    <div id="toast" class="hidden fixed inset-0 z-[200] items-center justify-center pointer-events-none transition-all duration-300 opacity-0 scale-90">
        <div class="bg-black/90 text-white px-10 py-5 rounded-[30px] shadow-2xl font-black italic flex items-center gap-4 border border-white/10">
            <span>Item Added!</span>
            <div class="w-8 h-8 bg-red-600 rounded-full flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg></div>
        </div>
    </div>

    <script src="cart.js"></script>
    <script>
        // SLIDER LOGIC
        let currentSlide = 0;
        const slider = document.getElementById('slider');
        const totalSlides = 2;

        function updateSlider() {
            slider.style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        function moveSlide(direction) {
            currentSlide = (currentSlide + direction + totalSlides) % totalSlides;
            updateSlider();
        }

        setInterval(() => {
            moveSlide(1);
        }, 4000);

        // CATEGORY LOGIC
        function scrollCats(amount) {
            document.getElementById('cat-scroll').scrollBy({ left: amount, behavior: 'smooth' });
        }

        function handleCategoryClick(btn, category) {
            if (typeof displayProducts === 'function') displayProducts(category);
            setTimeout(() => {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('active-cat');
                    b.classList.add('text-gray-400');
                });
                btn.classList.add('active-cat');
                btn.classList.remove('text-gray-400');
            }, 50);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof injectNavbar === 'function') injectNavbar();
            if (typeof displayProducts === 'function') displayProducts('All');
        });
    </script>
</body>
</html>
