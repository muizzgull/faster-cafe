<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASTER CAFE | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                red: {
                  50: '#fef2f2',
                  100: '#fee2e2',
                  200: '#fecaca',
                  600: '#E72229',
                },
              },
            },
          },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        .floating { animation: float 4s ease-in-out infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .filter-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); white-space: nowrap; }
        .filter-btn:hover:not(.active-cat) { background-color: rgba(0,0,0,0.05); color: #E72229; }
        .active-cat { background-color: #000 !important; color: #fff !important; }
    </style>
</head>
<body class="bg-white">

    <div id="navbar-placeholder"></div>

    <div class="relative top-[72px] w-full z-[80]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6">
            <div class="bg-gradient-to-r from-red-100 via-white to-red-100 border-x-2 border-b-2 border-red-200 rounded-b-[30px] py-5 px-6 text-center shadow-md">
                <p class="text-[10px] md:text-sm font-black text-red-600 uppercase tracking-wide">
                    Note: Some images may be for illustration & Some images may not be of our restaurant & some images may not represent that item & one image may be used for multiple items.
                </p>
            </div>
        </div>
    </div>

    <div id="toast" class="hidden fixed inset-0 z-[200] items-center justify-center pointer-events-none transition-all duration-300 opacity-0 scale-90">
        <div class="bg-black/90 text-white px-10 py-5 rounded-[30px] shadow-2xl font-black italic flex items-center gap-4 border border-white/10">
            <span>Item Added!</span>
            <div class="w-8 h-8 bg-red-600 rounded-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
            </div>
        </div>
    </div>

    <div id="pizza-modal" class="hidden fixed inset-0 z-[300] items-center justify-center bg-black/60 backdrop-blur-sm p-4 transition-all duration-300">
        <div class="modal-content bg-white w-full max-w-md rounded-[40px] shadow-2xl overflow-hidden transform scale-90 opacity-0 transition-all duration-300">
            <div class="relative p-8 pb-4">
                <button onclick="closePizzaModal()" class="absolute top-6 right-6 text-gray-400 hover:text-black">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
                <span class="text-red-600 font-black text-[10px] uppercase tracking-widest">Customize Your Order</span>
                <h2 id="modal-pizza-name" class="text-3xl font-black italic uppercase leading-tight mb-4">Item Name</h2>
            </div>
            <div id="pizza-options" class="px-8 flex flex-col gap-3"></div>
            <div class="p-8">
                <button onclick="confirmPizzaSelection()" class="w-full bg-black text-white py-5 rounded-2xl font-black text-sm hover:bg-red-600 transition shadow-lg shadow-black/10">CONFIRM & ADD</button>
            </div>
        </div>
    </div>

    <section class="relative min-h-screen flex items-center pt-40 px-6 bg-slate-50 overflow-hidden">
        <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-12 items-center">
            <div class="z-10 text-center lg:text-left">
                <h1 class="text-6xl md:text-8xl font-black italic leading-[0.9] mt-6 mb-8 uppercase">ORDER IT. <br> <span class="text-red-600">EAT IT.</span></h1>
                <a href="#menu" class="bg-black text-white px-10 py-5 rounded-2xl font-black text-lg hover:bg-red-600 transition inline-block shadow-2xl">EXPLORE MENU</a>
            </div>
            <div class="relative flex justify-center lg:justify-end">
                <img src="doube-decker-burger.png" class="w-48 sm:w-64 lg:w-[450px] floating drop-shadow-2xl">
            </div>
        </div>
    </section>

    <section id="menu" class="max-w-7xl mx-auto px-6 py-24">
        <div class="text-center mb-12">
            <h2 class="text-5xl font-black italic uppercase leading-none text-black">Our <span class="text-red-600"> Menu</span></h2>
        </div>

        <div class="relative group max-w-5xl mx-auto mb-16 top-28 z-50">
            <button onclick="scrollCats(-200)" class="absolute -left-4 top-1/2 -translate-y-1/2 z-[60] bg-white shadow-lg border border-gray-100 w-10 h-10 rounded-full flex items-center justify-center text-black hover:text-red-600 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg>
            </button>

            <div id="cat-scroll" class="flex-1 flex overflow-x-auto no-scrollbar gap-2 bg-gray-100/80 backdrop-blur-md p-2 rounded-[35px] border border-gray-200 scroll-smooth mx-8">
                <button onclick="displayProducts('All')" class="filter-btn active-cat px-6 py-2 rounded-full text-[10px] font-black uppercase">All</button>
                <button onclick="displayProducts('Deals')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Deals 🔥</button>
                <button onclick="displayProducts('Special Deals')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Special</button>
                <button onclick="displayProducts('Pizza Deals')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Pizza Deals</button>
                <button onclick="displayProducts('Burgers')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Burgers</button>
                <button onclick="displayProducts('Pizza')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Pizza</button>
                <button onclick="displayProducts('Signature Pizza')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Signature</button>
                <button onclick="displayProducts('Shawarmas')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Shawarma</button>
                <button onclick="displayProducts('Paratha Rolls')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Paratha</button>
                <button onclick="displayProducts('Wraps')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Wraps</button>
                <button onclick="displayProducts('Fries')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Fries</button>
                <button onclick="displayProducts('Hot Wings')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Wings</button>
                <button onclick="displayProducts('Nuggets')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Nuggets</button>
                <button onclick="displayProducts('Chicken Strips')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Strips</button>
                <button onclick="displayProducts('Drinks')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Drinks</button>
                <button onclick="displayProducts('Others')" class="filter-btn text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase">Others</button>
            </div>

            <button onclick="scrollCats(200)" class="absolute -right-4 top-1/2 -translate-y-1/2 z-[60] bg-white shadow-lg border border-gray-100 w-10 h-10 rounded-full flex items-center justify-center text-black hover:text-red-600 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" /></svg>
            </button>
        </div>

        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </section>

    <script src="cart.js"></script>
    <script>
        function scrollCats(amount) {
            document.getElementById('cat-scroll').scrollBy({ left: amount, behavior: 'smooth' });
        }
        document.addEventListener('DOMContentLoaded', () => { 
            if (typeof injectNavbar === 'function') injectNavbar(); 
            if (typeof displayProducts === 'function') displayProducts('All'); 
        });
    </script>
</body>
</html>
