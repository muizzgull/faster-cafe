<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.jpeg" type="image/x-icon">
    <title>Order History | FASTER CAFE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: { extend: { colors: { red: { 50: '#fef2f2', 100: '#fee2e2', 600: '#E72229' } } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; overflow-x: hidden; }</style>
</head>
<body class="bg-gray-50 pt-24 pb-20 px-4 md:px-6">
    <div id="navbar-placeholder"></div>
    <main class="max-w-3xl mx-auto">
        <div class="mb-8 md:mb-10 text-center md:text-left">
            <h1 class="text-3xl md:text-4xl font-black italic uppercase">Your <span class="text-[#E72229]">History</span></h1>
            <p class="text-gray-400 font-bold text-[10px] uppercase tracking-widest mt-2">Track your previous cravings</p>
        </div>
        <div id="orders-container" class="space-y-4 md:space-y-6"></div>
    </main>
    <script src="cart.js"></script>
    <script>
        function renderOrders() {
            const container = document.getElementById('orders-container');
            const history = JSON.parse(localStorage.getItem('faster_cafe_history')) || [];
            if (history.length === 0) {
                container.innerHTML = `<div class="bg-white p-12 rounded-[30px] md:rounded-[40px] text-center shadow-sm font-black italic uppercase text-gray-400">No orders yet.</div>`;
                return;
            }
            container.innerHTML = history.map(order => `
                <div class="bg-white p-6 md:p-8 rounded-[30px] md:rounded-[40px] shadow-sm border border-gray-100 h-auto overflow-hidden">
                    <div class="flex flex-col md:flex-row justify-between items-start mb-4 gap-2">
                        <div class="min-w-0">
                            <span class="text-[9px] font-black bg-red-100 text-[#E72229] px-3 py-1 rounded-full uppercase inline-block mb-2">${order.orderId}</span>
                            <p class="text-gray-400 text-[10px] font-bold uppercase">${order.date} • ${order.time}</p>
                        </div>
                        <p class="text-xl md:text-2xl font-black whitespace-nowrap">Rs. ${order.total}</p>
                    </div>
                    <div class="space-y-4 border-t pt-4">
                        ${order.items.map(i => `
                            <div class="text-xs font-bold w-full">
                                <div class="flex justify-between items-start gap-4">
                                    <span class="flex-1">${i.quantity}x ${i.name}</span>
                                    <span class="whitespace-nowrap">Rs. ${i.price * i.quantity}</span>
                                </div>
                                ${i.note ? `
                                    <div class="bg-gray-50 p-3 rounded-2xl mt-2 border-l-4 border-[#E72229]">
                                        <p class="text-[10px] text-black break-words leading-relaxed">${i.note}</p>
                                    </div>
                                ` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof injectNavbar === 'function') injectNavbar();
            renderOrders();
        });
    </script>
</body>
</html>
