<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Confirmation | FASTER CAFE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { red: { 50: '#fef2f2', 600: '#E72229' } } } } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; overflow-x: hidden; }</style>
</head>
<body class="bg-gray-50 pt-24 pb-12 px-4 md:px-6">
    <div id="navbar-placeholder"></div>
    <div id="checkout-container" class="max-w-2xl mx-auto bg-white rounded-[30px] md:rounded-[40px] shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-black p-6 md:p-8 text-center">
            <h1 class="text-white text-2xl md:text-3xl font-black italic uppercase">Confirm <span class="text-[#E72229]">Order</span></h1>
        </div>
        <div class="p-6 md:p-8 space-y-6 md:space-y-8">
            <div>
                <h3 class="text-[10px] font-black text-[#E72229] uppercase tracking-widest mb-3 border-b pb-2">Delivery To</h3>
                <div id="user-summary" class="bg-gray-50 p-4 md:p-6 rounded-2xl font-bold text-gray-700 text-sm"></div>
            </div>
            <div>
                <h3 class="text-[10px] font-black text-[#E72229] uppercase tracking-widest mb-3 border-b pb-2">Your Items</h3>
                <div id="order-summary" class="space-y-2 font-mono text-[11px] md:text-sm bg-gray-50 p-4 md:p-6 rounded-2xl"></div>
            </div>
            <div class="flex justify-between items-center pt-4 border-t">
                <span class="font-black text-lg md:text-xl italic uppercase">Total</span>
                <span id="final-total" class="text-3xl md:text-4xl font-black text-[#E72229]">Rs. 0</span>
            </div>
            <div id="action-area" class="space-y-4">
                <button onclick="sendOrderNow()" class="w-full bg-[#E72229] text-white py-5 md:py-6 rounded-2xl md:rounded-[30px] font-black text-lg md:text-xl shadow-xl uppercase italic">Place Order</button>
                <a href="cart.html" class="block text-center text-gray-400 font-bold uppercase text-[10px]">Edit Cart</a>
            </div>
            <div id="loading-state" class="hidden text-center py-4">
                <div class="animate-spin rounded-full h-8 w-8 border-t-4 border-[#E72229] mx-auto mb-2"></div>
                <p class="font-black italic text-gray-400 text-xs">ORDER PLACING...</p>
            </div>
        </div>
    </div>
    <script src="cart.js"></script>
    <script>
        const SERVICE_ID = "service_j6ykc3l", TEMPLATE_ID = "template_xd90e9i", PUBLIC_KEY = "wgoq7xcLbnYxDE_Iy";
        (function() { if(PUBLIC_KEY !== "YOUR_PUBLIC_KEY") emailjs.init(PUBLIC_KEY); })();
        function initPage() {
            if (typeof injectNavbar === 'function') injectNavbar();
            const cartData = JSON.parse(localStorage.getItem('faster_cafe_cart')) || [];
            const userData = JSON.parse(localStorage.getItem('faster_cafe_user')) || null;
            if (!userData || cartData.length === 0) { window.location.href = 'index.html'; return; }
            document.getElementById('user-summary').innerHTML = `<p class="text-black text-base">${userData.name}</p><p class="text-gray-600">${userData.phone} | ${userData.email}</p><p class="mt-2 text-gray-400">${userData.address}</p>`;
            let itemsHtml = "", grandTotal = 0;
            cartData.forEach(item => { const sub = item.price * item.quantity; grandTotal += sub; itemsHtml += `<div class="border-b border-gray-200 pb-2 mb-2"><div class="flex justify-between font-black uppercase text-gray-800"><span>${item.quantity}x ${item.name}</span><span>Rs. ${sub}</span></div>${item.note ? `<p class="text-[10px] text-[#E72229] italic font-bold mt-1">Note: ${item.note}</p>` : ''}</div>`; });
            document.getElementById('order-summary').innerHTML = itemsHtml;
            document.getElementById('final-total').innerText = `Rs. ${grandTotal}`;
        }
        async function sendOrderNow() {
            const loading = document.getElementById('loading-state'), actionArea = document.getElementById('action-area');
            const cartData = JSON.parse(localStorage.getItem('faster_cafe_cart')), userData = JSON.parse(localStorage.getItem('faster_cafe_user'));
            actionArea.classList.add('hidden'); loading.classList.remove('hidden');
            let detailsString = "", total = 0;
            cartData.forEach(item => { const sub = item.price * item.quantity; total += sub; detailsString += `${item.quantity}x ${item.name}\n Price: Rs. ${item.price} | Sub: Rs. ${sub}\n${item.note ? ' Note: ' + item.note + '\n' : ''}----------------\n`; });
            const orderID = `FC-${Math.floor(100000 + Math.random() * 900000)}`;
            try {
                await emailjs.send(SERVICE_ID, TEMPLATE_ID, { order_id: orderID, customer_name: userData.name, customer_phone: userData.phone, customer_email: userData.email, customer_address: userData.address, order_details: detailsString, total_price: `Rs. ${total}` });
                const history = JSON.parse(localStorage.getItem('faster_cafe_history')) || [];
                history.unshift({ orderId: orderID, date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), total: total, items: cartData });
                localStorage.setItem('faster_cafe_history', JSON.stringify(history));
                localStorage.removeItem('faster_cafe_cart');
                document.getElementById('checkout-container').innerHTML = `<div class="p-12 text-center border-t-8 border-[#E72229]"><div class="text-5xl mb-6">🔥</div><h1 class="text-3xl font-black italic uppercase mb-4">PLACED!</h1><a href="index.html" class="inline-block bg-black text-white px-8 py-4 rounded-full font-black uppercase italic">Return</a></div>`;
            } catch (error) { alert("Error: " + JSON.stringify(error)); actionArea.classList.remove('hidden'); loading.classList.add('hidden'); }
        }
        window.onload = initPage;
    </script>
</body>
</html>
